{% extends 'base.html' %}
{% block title %}Departments{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Departments</h4>
    <a href="{% url 'employees:department_create' %}" class="btn btn-dark btn-sm">+ Add Department</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>Name</th><th>Code</th><th>Actions</th></tr></thead>
            <tbody>
                {% for dept in departments %}
                <tr>
                    <td>{{ dept.name }}</td>
                    <td>{{ dept.code }}</td>
                    <td>
                        <a href="{% url 'employees:department_update' dept.pk %}" class="btn btn-sm btn-outline-dark">Edit</a>
                        <a href="{% url 'employees:department_delete' dept.pk %}" class="btn btn-sm btn-outline-danger">Del</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center text-muted">No departments.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
