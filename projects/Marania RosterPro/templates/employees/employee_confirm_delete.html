{% extends 'base.html' %}
{% block title %}Delete Employee{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5>Confirm Delete</h5></div>
    <div class="card-body">
        <p>Delete employee <strong>{{ employee.full_name }}</strong> ({{ employee.employee_id }})?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'employees:employee_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
