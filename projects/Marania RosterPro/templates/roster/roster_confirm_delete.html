{% extends 'base.html' %}
{% block title %}Delete Roster{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5>Confirm Delete</h5></div>
    <div class="card-body">
        <p>Delete roster <strong>{{ roster.name }}</strong> for {{ roster.team.name }}?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'roster:roster_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
